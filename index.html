<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AES-256-CBC Encrypt / Decrypt</title>
	<style>
		* {
			box-sizing: border-box;
			margin: 0;
			padding: 0
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
			background: #0f0f0f;
			color: #e0e0e0;
			display: flex;
			justify-content: center;
			align-items: center;
			min-height: 100vh;
			padding: 20px
		}

		.container {
			width: 100%;
			max-width: 680px;
			background: #1a1a1a;
			border-radius: 12px;
			padding: 32px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, .5)
		}

		h1 {
			font-size: 20px;
			font-weight: 600;
			margin-bottom: 4px;
			color: #fff
		}

		p {
			font-size: 13px;
			color: #888;
			margin-bottom: 24px
		}

		.tabs {
			display: flex;
			gap: 0;
			margin-bottom: 20px;
			background: #121212;
			border-radius: 8px;
			overflow: hidden;
			border: 1px solid #2a2a2a
		}

		.tab {
			flex: 1;
			padding: 10px;
			text-align: center;
			cursor: pointer;
			font-size: 14px;
			font-weight: 500;
			color: #666;
			background: transparent;
			border: none;
			transition: all .2s
		}

		.tab.active {
			color: #fff;
			background: #4f8cff
		}

		.tab:not(.active):hover {
			color: #aaa;
			background: #1e1e1e
		}

		.panel {
			display: none
		}

		.panel.active {
			display: block
		}

		label {
			display: block;
			font-size: 13px;
			font-weight: 500;
			margin-bottom: 6px;
			color: #aaa
		}

		textarea {
			width: 100%;
			min-height: 120px;
			background: #121212;
			border: 1px solid #2a2a2a;
			border-radius: 8px;
			color: #e0e0e0;
			padding: 14px;
			font-family: "SF Mono", "Fira Code", "Consolas", monospace;
			font-size: 13px;
			resize: vertical;
			outline: none;
			transition: border-color .2s
		}

		textarea:focus {
			border-color: #4f8cff
		}

		button {
			width: 100%;
			padding: 12px;
			background: #4f8cff;
			color: #fff;
			border: none;
			border-radius: 8px;
			font-size: 15px;
			font-weight: 600;
			cursor: pointer;
			margin-top: 14px;
			transition: background .2s
		}

		button:hover {
			background: #3a7bef
		}

		button:active {
			transform: scale(.99)
		}

		button.danger {
			background: #e74c3c
		}

		button.danger:hover {
			background: #c0392b
		}

		.result {
			margin-top: 16px;
			padding: 16px;
			border-radius: 8px;
			display: none;
			word-break: break-all;
			font-family: "SF Mono", "Fira Code", "Consolas", monospace;
			font-size: 13px;
			line-height: 1.5
		}

		.result.show {
			display: block
		}

		.result.success {
			background: #0d2818;
			border: 1px solid #1a4a2e;
			color: #6fcf97
		}

		.result.error {
			background: #2a0d0d;
			border: 1px solid #4a1a1a;
			color: #cf6f6f
		}

		.copy-btn {
			display: none;
			margin-top: 8px;
			padding: 6px 14px;
			font-size: 12px;
			border-radius: 6px;
			cursor: pointer;
			border: 1px solid #333;
			background: #1a1a1a;
			color: #aaa;
			transition: all .2s
		}

		.copy-btn.show {
			display: inline-block
		}

		.copy-btn:hover {
			background: #222;
			color: #fff
		}

		.hint {
			font-size: 12px;
			color: #555;
			margin-top: 6px
		}
	</style>
</head>

<body>
	<div class="container">

		<div class="tabs" role="tablist">
			<button class="tab active" data-tab="encrypt">idher</button>
			<button class="tab" data-tab="decrypt">udher</button>
		</div>

		<div id="panel-encrypt" class="panel active">
			<textarea id="plaintext"></textarea>
			<button id="encrypt-btn">idher</button>
			<div id="encrypt-result" class="result"></div>
			<button id="copy-enc" class="copy-btn">Copy to clipboard</button>
		</div>

		<div id="panel-decrypt" class="panel">
			<textarea id="ciphertext"></textarea>
			<button id="decrypt-btn" class="danger">udher</button>
			<div id="decrypt-result" class="result"></div>
			<button id="copy-dec" class="copy-btn">Copy to clipboard</button>
		</div>

	</div>

	<script>
		const SECRET_KEY = 'ef9ad83e-6971-469c-97be-c432ab21b083';

		const tabs = document.querySelectorAll('.tab');
		const panels = { encrypt: document.getElementById('panel-encrypt'), decrypt: document.getElementById('panel-decrypt') };
		const plaintext = document.getElementById('plaintext');
		const ciphertext = document.getElementById('ciphertext');
		const encBtn = document.getElementById('encrypt-btn');
		const decBtn = document.getElementById('decrypt-btn');
		const encResult = document.getElementById('encrypt-result');
		const decResult = document.getElementById('decrypt-result');
		const copyEnc = document.getElementById('copy-enc');
		const copyDec = document.getElementById('copy-dec');

		tabs.forEach(t => t.addEventListener('click', () => {
			tabs.forEach(x => x.classList.remove('active'));
			t.classList.add('active');
			Object.keys(panels).forEach(k => panels[k].classList.toggle('active', k === t.dataset.tab));
			encResult.classList.remove('show');
			decResult.classList.remove('show');
			copyEnc.classList.remove('show');
			copyDec.classList.remove('show');
		}));

		async function deriveKey(secret) {
			const enc = new TextEncoder();
			const hash = await crypto.subtle.digest('SHA-256', enc.encode(secret));
			return crypto.subtle.importKey('raw', hash, { name: 'AES-CBC' }, false, ['encrypt', 'decrypt']);
		}

		async function encrypt(text) {
			const iv = crypto.getRandomValues(new Uint8Array(16));
			const key = await deriveKey(SECRET_KEY);
			const encoded = new TextEncoder().encode(text);
			const encrypted = await crypto.subtle.encrypt({ name: 'AES-CBC', iv }, key, encoded);
			const ivHex = Array.from(iv).map(b => b.toString(16).padStart(2, '0')).join('');
			const dataHex = Array.from(new Uint8Array(encrypted)).map(b => b.toString(16).padStart(2, '0')).join('');
			return ivHex + ':' + dataHex;
		}

		async function decrypt(encryptedText) {
			const colonIdx = encryptedText.indexOf(':');
			if (colonIdx === -1) throw new Error('Invalid format: missing ":" separator');
			const ivHex = encryptedText.slice(0, colonIdx);
			const payloadHex = encryptedText.slice(colonIdx + 1);
			if (ivHex.length !== 32) throw new Error('Invalid IV length (expected 32 hex chars = 16 bytes)');
			const iv = new Uint8Array(ivHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
			const encrypted = new Uint8Array(payloadHex.match(/.{1,2}/g).map(b => parseInt(b, 16)));
			const key = await deriveKey(SECRET_KEY);
			const decrypted = await crypto.subtle.decrypt({ name: 'AES-CBC', iv }, key, encrypted);
			return new TextDecoder().decode(decrypted);
		}

		async function handleEncrypt() {
			const text = plaintext.value;
			if (!text) { showResult(encResult, 'Please enter text to encrypt.', 'error'); copyEnc.classList.remove('show'); return; }
			encBtn.disabled = true; encBtn.textContent = 'Encrypting\u2026';
			try {
				const result = await encrypt(text);
				showResult(encResult, result, 'success');
				copyEnc.classList.add('show');
			} catch (e) {
				showResult(encResult, 'Encryption failed: ' + e.message, 'error');
				copyEnc.classList.remove('show');
			} finally {
				encBtn.disabled = false; encBtn.textContent = 'Encrypt';
			}
		}

		async function handleDecrypt() {
			const text = ciphertext.value.trim();
			if (!text) { showResult(decResult, 'Please paste encrypted text.', 'error'); copyDec.classList.remove('show'); return; }
			decBtn.disabled = true; decBtn.textContent = 'Decrypting\u2026';
			try {
				const result = await decrypt(text);
				showResult(decResult, result, 'success');
				copyDec.classList.add('show');
			} catch (e) {
				showResult(decResult, 'Decryption failed: ' + e.message, 'error');
				copyDec.classList.remove('show');
			} finally {
				decBtn.disabled = false; decBtn.textContent = 'Decrypt';
			}
		}

		function showResult(el, msg, type) {
			el.textContent = msg;
			el.className = 'result show ' + type;
		}

		encBtn.addEventListener('click', handleEncrypt);
		decBtn.addEventListener('click', handleDecrypt);

		plaintext.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) handleEncrypt(); });
		ciphertext.addEventListener('keydown', e => { if (e.key === 'Enter' && e.ctrlKey) handleDecrypt(); });

		copyEnc.addEventListener('click', () => copyToClipboard(encResult.textContent));
		copyDec.addEventListener('click', () => copyToClipboard(decResult.textContent));

		async function copyToClipboard(text) {
			try { await navigator.clipboard.writeText(text); } catch { const ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
		}
	</script>
</body>

</html>
